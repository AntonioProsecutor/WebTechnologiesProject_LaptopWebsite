<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Laptop - Laptop Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">💻 Laptop Online Shop</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4 text-center">Edit Laptop</h2>
                        <form id="editLaptopForm">
                            <div class="mb-3">
                                <label class="form-label">Product ID</label>
                                <input type="text" class="form-control bg-light" id="productId" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Name (Brand + Model)</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Processor (CPU)</label>
                                    <input type="text" class="form-control" id="processor" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">RAM (GB)</label>
                                    <input type="number" class="form-control" id="ram" min="4" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Storage</label>
                                    <input type="text" class="form-control" id="storage" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Graphics</label>
                                    <input type="text" class="form-control" id="graphics" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Display</label>
                                    <input type="text" class="form-control" id="display" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Operating System</label>
                                    <input type="text" class="form-control" id="system" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Year</label>
                                    <input type="number" class="form-control" id="year" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Stock Quantity</label>
                                    <input type="number" class="form-control" id="stock" min="0" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="price" required>
                                </div>
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="index.html" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-5" onclick="updateLaptop(event)">Update Laptop</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/edit-laptop.js"></script>
</body>
</html>
