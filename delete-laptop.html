<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Laptop - Laptop Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">💻 Laptop Online Shop</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-danger">
                    <div class="card-body p-5">
                        <h2 class="text-danger mb-4">Delete Laptop</h2>
                        <p class="lead">Are you sure you want to delete this laptop?</p>

                        <div class="alert alert-light border">
                            <p><strong>Name:</strong> <span id="infoName"></span></p>
                            <p><strong>Product ID:</strong> <span id="infoId"></span></p>   <!-- changed here -->
                            <p><strong>CPU:</strong> <span id="infoProcessor"></span></p>
                            <p><strong>Operating System:</strong> <span id="infoSystem"></span></p>
                        </div>

                        <p class="text-muted">This action cannot be undone.</p>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="index.html" class="btn btn-secondary">Cancel</a>
                            <button id="confirmDeleteBtn" class="btn btn-danger">Yes, Delete Laptop</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/delete-laptop.js"></script>
</body>
</html>
