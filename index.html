
<!DOCTYPE html>
<html lang="en">
<head>
   
   
    <title>Laptop online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body >
   <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class='navbar-brand mb-0 h1' href='index.html'>Laptop online Shop</a>
              </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>Laptop shop</h2>
            </div>
            <div class="col-md-4 text-end">
                <a class='btn btn-primary' href='add-laptop.html'>+ Add Laptop</a>
                <button class="btn btn-danger ms-2" id="clearAllBtn">Clear All</button>
            </div>
        </div>

       
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="laptopsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>DeviceId</th>
                            <th>ProductId</th>
                            <th>Processor</th>
                            <th>Ram</th>
                            <th>Storage</th>
                            <th>Graphic Cards</th>
                            <th>System Type</th>
                            <th>Year that was produced</th>
                            <th>Current amount</th>
                            <th>The price</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="11" class="text-center text-muted py-4">
                                No laptops currently here. Check again later.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scripts/index.js"></script>

</body>
</html>
