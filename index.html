
<head>
   
   
    <title>Laptop online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body >
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-5">
    <div class="container">
        <a class='navbar-brand fw-bold text-primary' href='index.html'>
            <span class="badge bg-primary-subtle text-primary me-2">L</span>Laptop Shop </a>
    </div>
</nav>

   <div class="container">
    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h2 class="display-6 fw-semibold">Inventory Management</h2>
            <p class="text-muted">Manage all the laptops for this online shop</p>
        </div>
        <div class="col-md-4 text-md-end">
            <a class='btn btn-primary rounded-pill px-4' href='add-laptop.html'>+ Add Laptop</a>
            <button class="btn btn-outline-danger rounded-pill ms-2" id="clearAllBtn">Clear All</button>
        </div>
    </div>

       
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-borderless table-hover mb-0" id="laptopsTable">
                <thead class="bg-primary-subtle text-primary">
                    <tr>
                        <th class="ps-4">Name</th>
                        <th>Device ID</th>
                        <th>Product ID</th>
                        <th>Processor</th>
                        <th>RAM</th>
                        <th>Storage</th>
                        <th>Graphics</th>
                        <th>System</th>
                        <th>Year</th>
                        <th>Stock</th>
                        <th class="pe-4">Price</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="align-middle">
                    <tr>
                        <td colspan="11" class="text-center py-5">
                            <div class="opacity-50">
                                <h5 class="mb-1">Your warehouse is empty</h5>
                                <p class="small mb-0">Check again later or add a new unit.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
   

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scripts/index.js"></script>

</body>
</html>
