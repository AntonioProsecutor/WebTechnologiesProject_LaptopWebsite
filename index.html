<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0f172a !important; }
        .card { box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .table thead { background-color: #1e2937; color: white; }
        .btn-lg { font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">💻 Laptop Online Shop</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Inventory</h2>
            <a href="add-laptop.html" class="btn btn-success btn-lg">+ Add Laptop</a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0" id="laptopsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Product ID</th>
                            <th>Processor</th>
                            <th>RAM</th>
                            <th>Storage</th>
                            <th>Graphics</th>
                            <th>Display</th>
                            <th>System</th>
                            <th>Year</th>
                            <th>Stock</th>
                            <th>Price</th>
                            <th style="width: 140px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/index.js"></script>
</body>
</html>
