<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Laptop - Laptop Online Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-control::placeholder {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Laptop Online Shop</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4 text-center">Add New Laptop</h2>
                        
                        <form id="addLaptopForm">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label">Name (Brand + Model)</label>
                                    <input type="text" class="form-control" id="name" 
                                           placeholder="e.g. ASUS ROG Strix G16" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Processor (CPU)</label>
                                    <input type="text" class="form-control" id="processor" 
                                           placeholder="e.g. Intel Core i9-14900HX" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">RAM (GB)</label>
                                    <input type="number" class="form-control" id="ram" min="4" 
                                           placeholder="e.g. 16" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Storage</label>
                                    <input type="text" class="form-control" id="storage" 
                                           placeholder="e.g. 1TB NVMe SSD" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Graphics</label>
                                    <input type="text" class="form-control" id="graphics" 
                                           placeholder="e.g. NVIDIA RTX 4070" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Display</label>
                                    <input type="text" class="form-control" id="display" 
                                           placeholder="e.g. 16&quot; QHD+ 165Hz" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Operating System</label>
                                    <input type="text" class="form-control" id="system" 
                                           placeholder="e.g. Windows 11 Home" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Year</label>
                                    <input type="number" class="form-control" id="year" 
                                           placeholder="2024" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Stock Quantity</label>
                                    <input type="number" class="form-control" id="stock" min="0" 
                                           placeholder="10" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="price" 
                                           placeholder="1299.99" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="index.html" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-5" onclick="saveLaptopInfo(event)">Save Laptop</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/add-laptop.js"></script>
</body>
</html>
